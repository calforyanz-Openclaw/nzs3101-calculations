<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZS 3101 Development Length Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Fraunces:wght@600&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0f172a; --muted: #5b6474; --accent: #0f766e; --card: rgba(255,255,255,0.85); --shadow: 0 20px 50px rgba(15,23,42,0.15); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(160deg, #f5e8d4 0%, #e4d3c1 50%, #c7b098 100%); font-family: 'Space Grotesk', sans-serif; color: var(--ink); padding: 2rem 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem,4vw,2.5rem); margin: 0 0 0.5rem; color: var(--ink); }
    .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .card { background: var(--card); border-radius: 16px; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
    h2 { margin: 0 0 1rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
    .field input, .field select { padding: 0.6rem 0.8rem; border-radius: 8px; border: 1px solid rgba(15,23,42,0.15); font-size: 0.95rem; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,118,110,0.1); }
    .checkbox-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .checkbox-row label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.9rem; }
    .btn { background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 999px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .result { display: none; margin-top: 1.5rem; }
    .result.show { display: block; }
    .result-box { background: #e8f5f3; border-radius: 12px; padding: 1.2rem; border-left: 4px solid var(--accent); }
    .result-box h3 { margin: 0 0 0.8rem; font-size: 1.1rem; }
    .result-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .steps { margin-top: 1rem; background: white; border-radius: 10px; padding: 1rem; font-size: 0.9rem; line-height: 1.6; }
    .steps code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 4px; }
    .formula { background: #f8f8f8; padding: 0.8rem; border-radius: 8px; margin: 0.5rem 0; font-family: monospace; font-size: 0.85rem; }
    .note { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NZS 3101 Development Length</h1>
    <p class="subtitle">Calculate rebar development length and hooked bar anchorage per NZS 3101:2006 Clause 8.6</p>

    <div class="card">
      <h2>Materials & Bar</h2>
      <div class="form-grid">
        <div class="field">
          <label>f'c (MPa)</label>
          <input type="number" id="fc" value="30" step="0.5" min="10">
        </div>
        <div class="field">
          <label>fy (MPa)</label>
          <input type="number" id="fy" value="500" step="10" min="250">
        </div>
        <div class="field">
          <label>Bar diameter db (mm)</label>
          <input type="number" id="db" value="16" step="1" min="6">
        </div>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" id="topBar"> Top bar (>300mm below fresh concrete)</label>
      </div>
    </div>

    <div class="card">
      <h2>Calculation Type</h2>
      <div class="form-grid">
        <div class="field">
          <label>Type</label>
          <select id="calcType">
            <option value="basic">Straight - Basic (Eq 8-2)</option>
            <option value="refined">Straight - Refined (Eq 8-3)</option>
            <option value="hook">Hooked - Standard (Eq 8-12)</option>
          </select>
        </div>
      </div>
      <div class="form-grid" id="refinedParams" style="margin-top:1rem;display:none;">
        <div class="field"><label>As provided (mm²)</label><input type="number" id="As" value="400"></div>
        <div class="field"><label>As required (mm²)</label><input type="number" id="Areq" value="300"></div>
        <div class="field"><label>Cover cm (mm)</label><input type="number" id="cm" value="30"></div>
        <div class="field"><label>Atr (mm²)</label><input type="number" id="Atr" value="0"></div>
        <div class="field"><label>Spacing s (mm)</label><input type="number" id="s" value="100"></div>
        <div class="field"><label>fyt (MPa)</label><input type="number" id="fyt" value="300"></div>
      </div>
      <div class="form-grid" id="hookParams" style="margin-top:1rem;display:none;">
        <div class="field"><label>As provided (mm²)</label><input type="number" id="AsH" value="400"></div>
        <div class="field"><label>As required (mm²)</label><input type="number" id="AreqH" value="300"></div>
        <div class="checkbox-row">
          <label><input type="checkbox" id="d32" checked> db ≤ 32mm</label>
          <label><input type="checkbox" id="sideCover"> Side cover ≥ 60mm</label>
          <label><input type="checkbox" id="confined"> Confined by stirrups</label>
        </div>
      </div>
    </div>

    <button class="btn" onclick="calculate()">Calculate</button>

    <div class="result" id="result">
      <div class="result-box">
        <h3>Development Length</h3>
        <div class="result-value" id="Ld">-</div>
        <div class="steps" id="steps"></div>
      </div>
      <p class="note">Based on NZS 3101:2006 Clause 8.6. Results for quick checks only - verify with full design.</p>
    </div>
  </div>

  <script>
    function calculate() {
      const fc = parseFloat(document.getElementById('fc').value);
      const fy = parseFloat(document.getElementById('fy').value);
      const db = parseFloat(document.getElementById('db').value);
      const topBar = document.getElementById('topBar').checked;
      const calcType = document.getElementById('calcType').value;

      const a1 = topBar ? 1.3 : 1.0;
      const fcCap = Math.min(fc, 70);
      const LdbBasic = 0.5 * a1 * fy / Math.sqrt(fcCap) * db;

      let result = '';
      let steps = '';

      if (calcType === 'basic') {
        result = LdbBasic.toFixed(0) + ' mm';
        steps = `<div class="formula">Equation 8-2: Ldb = 0.5 × α1 × (fy/√f'c) × db</div>
          α1 = ${a1} (${topBar ? 'top bar' : 'non-top bar'})<br>
          f'c capped at 70 MPa = ${fcCap} MPa<br>
          Ldb = 0.5 × ${a1} × (${fy}/√${fcCap}) × ${db} = ${result}`;
      } 
      else if (calcType === 'refined') {
        const As = parseFloat(document.getElementById('As').value);
        const Areq = parseFloat(document.getElementById('Areq').value);
        const cm = parseFloat(document.getElementById('cm').value);
        const Atr = parseFloat(document.getElementById('Atr').value);
        const s = parseFloat(document.getElementById('s').value);
        const fyt = parseFloat(document.getElementById('fyt').value);

        const aB = Math.min(1, Areq/As);
        const aC = Math.max(1, Math.min(1.5, 1 + 0.5*(cm/db - 1.5)));
        const aD = Math.max(1, Math.min(1.5, 1 + (Atr/s)*(fyt/(80*db))));
        const Ld = Math.max(300, (aB/(aC*aD)) * LdbBasic);

        result = Ld.toFixed(0) + ' mm';
        steps = `<div class="formula">Equation 8-3: Ld = (αb/(αc×αd)) × Ldb</div>
          αb = min(1, As,req/As,provided) = ${aB.toFixed(3)}<br>
          αc = ${aC.toFixed(3)}<br>
          αd = ${aD.toFixed(3)}<br>
          Ld = ${result}`;
      }
      else if (calcType === 'hook') {
        const AsH = parseFloat(document.getElementById('AsH').value);
        const AreqH = parseFloat(document.getElementById('AreqH').value);
        const d32 = document.getElementById('d32').checked;
        const sideCover = document.getElementById('sideCover').checked;
        const confined = document.getElementById('confined').checked;

        const aB = Math.min(1, AreqH/AsH);
        const a1h = (d32 && sideCover) ? 0.7 : 1.0;
        const a2h = confined ? 0.8 : 1.0;
        const base = 0.24 * aB * a1h * a2h * (fy/Math.sqrt(fcCap)) * db;
        const Ldh = Math.max(8*db, base);

        result = Ldh.toFixed(0) + ' mm';
        steps = `<div class="formula">Equation 8-12: Ldh = max(8db, 0.24×αb×α1×α2×(fy/√f'c)×db)</div>
          αb = ${aB.toFixed(3)}<br>
          α1 = ${a1h} (${d32 && sideCover ? '≤32mm & cover≥60mm' : 'other'})<br>
          α2 = ${a2h} (${confined ? 'confined' : 'not confined'})<br>
          Ldh = ${result}`;
      }

      document.getElementById('Ld').textContent = result;
      document.getElementById('steps').innerHTML = steps;
      document.getElementById('result').classList.add('show');
    }

    document.getElementById('calcType').addEventListener('change', function() {
      document.getElementById('refinedParams').style.display = this.value === 'refined' ? 'grid' : 'none';
      document.getElementById('hookParams').style.display = this.value === 'hook' ? 'grid' : 'none';
    });
  </script>
</body>
</html>

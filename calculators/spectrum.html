<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AS/NZS 1170.5 Response Spectrum</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Fraunces:wght@600&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0f172a; --muted: #5b6474; --accent: #1f6feb; --card: rgba(255,255,255,0.85); --shadow: 0 20px 50px rgba(15,23,42,0.15); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(160deg, #f5e8d4 0%, #e4d3c1 50%, #c7b098 100%); font-family: 'Space Grotesk', sans-serif; color: var(--ink); padding: 2rem 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem,4vw,2.5rem); margin: 0 0 0.5rem; color: var(--ink); }
    .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .card { background: var(--card); border-radius: 16px; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
    h2 { margin: 0 0 1rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
    .field input, .field select { padding: 0.6rem 0.8rem; border-radius: 8px; border: 1px solid rgba(15,23,42,0.15); font-size: 0.95rem; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,111,235,0.1); }
    .btn { background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 999px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .result { display: none; margin-top: 1.5rem; }
    .result.show { display: block; }
    .result-box { background: #eef3ff; border-radius: 12px; padding: 1.2rem; border-left: 4px solid var(--accent); }
    .result-box h3 { margin: 0 0 0.8rem; font-size: 1.1rem; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 1rem; margin-bottom: 1rem; }
    .result-item { background: white; padding: 0.8rem; border-radius: 8px; }
    .result-item label { font-size: 0.8rem; color: var(--muted); display: block; }
    .result-item span { font-size: 1.2rem; font-weight: 600; }
    #chart { width: 100%; height: 300px; background: white; border-radius: 10px; margin-top: 1rem; }
    .table-wrap { max-height: 200px; overflow-y: auto; background: white; border-radius: 10px; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.5rem; text-align: right; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; position: sticky; top: 0; }
    td:first-child, th:first-child { text-align: left; }
    .note { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AS/NZS 1170.5 Response Spectrum</h1>
    <p class="subtitle">Generate seismic response spectrum per AS/NZS 1170.5:2024 Clause 3.1</p>

    <div class="card">
      <h2>Site & Location</h2>
      <div class="form-grid">
        <div class="field">
          <label>Hazard Factor Z</label>
          <select id="Z">
            <option value="0.13">Z = 0.13 (Very Low)</option>
            <option value="0.20">Z = 0.20 (Low)</option>
            <option value="0.27">Z = 0.27 (Medium-Low)</option>
            <option value="0.36" selected>Z = 0.36 (Medium)</option>
            <option value="0.48">Z = 0.48 (High)</option>
            <option value="0.60">Z = 0.60 (Very High)</option>
            <option value="0.80">Z = 0.80 (Extreme)</option>
          </select>
        </div>
        <div class="field">
          <label>Subsoil Class</label>
          <select id="subsoil">
            <option value="A">A - Strong rock</option>
            <option value="B">B - Rock</option>
            <option value="C" selected>C - Shallow soil</option>
            <option value="D">D - Deep soil</option>
            <option value="E">E - Very deep soil</option>
          </select>
        </div>
        <div class="field">
          <label>Return Period Factor Ru (ULS)</label>
          <input type="number" id="Ru" value="1.0" step="0.1" min="0.5">
        </div>
        <div class="field">
          <label>Damping Ratio (%)</label>
          <input type="number" id="damping" value="5" step="0.5" min="0.5">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Period Range</h2>
      <div class="form-grid">
        <div class="field">
          <label>Tmin (s)</label>
          <input type="number" id="Tmin" value="0.0" step="0.1" min="0">
        </div>
        <div class="field">
          <label>Tmax (s)</label>
          <input type="number" id="Tmax" value="4.0" step="0.1" min="0.1">
        </div>
        <div class="field">
          <label>Step dT (s)</label>
          <input type="number" id="dT" value="0.05" step="0.01" min="0.01">
        </div>
      </div>
    </div>

    <button class="btn" onclick="calculate()">Generate Spectrum</button>

    <div class="result" id="result">
      <div class="result-box">
        <h3>Spectral Results</h3>
        <div class="result-grid">
          <div class="result-item"><label>Ch (0.0)</label><span id="Ch0">-</span></div>
          <div class="result-item"><label>Ch (0.4s)</label><span id="Ch04">-</span></div>
          <div class="result-item"><label>Ch (1.0s)</label><span id="Ch10">-</span></div>
          <div class="result-item"><label>Ch (2.0s)</label><span id="Ch20">-</span></div>
        </div>
        <canvas id="chart"></canvas>
        <div class="table-wrap">
          <table id="spectrumTable">
            <thead><tr><th>T (s)</th><th>Ch</th><th>Sa (g)</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <p class="note">Based on AS/NZS 1170.5:2024. Results for quick checks - verify with full standard.</p>
    </div>
  </div>

  <script>
    // Spectral shape factors from AS/NZS 1170.5 Table 3.1
    const ChTable = {
      A: { Ch1: 1.0, Ch2: 1.0, T1: 0.4, T2: 2.0, kT: 1.0 },
      B: { Ch1: 1.2, Ch2: 1.2, T1: 0.4, T2: 2.0, kT: 1.0 },
      C: { Ch1: 1.4, Ch2: 1.4, T1: 0.4, T2: 2.5, kT: 0.75 },
      D: { Ch1: 1.6, Ch2: 1.8, T1: 0.5, T2: 3.0, kT: 0.5 },
      E: { Ch1: 2.0, Ch2: 2.5, T1: 0.6, T2: 4.0, kT: 0.25 }
    };

    function calculate() {
      const Z = parseFloat(document.getElementById('Z').value);
      const subsoil = document.getElementById('subsoil').value;
      const Ru = parseFloat(document.getElementById('Ru').value);
      const damping = parseFloat(document.getElementById('damping').value);
      const Tmin = parseFloat(document.getElementById('Tmin').value);
      const Tmax = parseFloat(document.getElementById('Tmax').value);
      const dT = parseFloat(document.getElementById('dT').value);

      const site = ChTable[subsoil];
      
      // Damping factor per Clause 3.1.6
      const kD = damping <= 5 ? 1.0 : 0.67 + 0.33 * (damping / 25);

      const data = [];
      for (let T = Tmin; T <= Tmax; T += dT) {
        let Ch;
        if (T <= site.T1) {
          Ch = site.Ch1;
        } else if (T <= site.T2) {
          Ch = site.Ch1 + (site.Ch2 - site.Ch1) * (T - site.T1) / (site.T2 - site.T1);
        } else {
          Ch = site.Ch2 * Math.pow(site.kT * site.T2 / T, site.kT);
        }
        // Apply damping adjustment (simplified)
        Ch = Ch * kD;
        const Sa = Z * Ru * Ch;
        data.push({ T: T.toFixed(2), Ch: Ch.toFixed(3), Sa: Sa.toFixed(4) });
      }

      // Update result displays
      const Ch0 = data.find(d => parseFloat(d.T) >= 0)?.Ch || '-';
      const Ch04 = data.find(d => Math.abs(parseFloat(d.T) - 0.4) < 0.05)?.Ch || '-';
      const Ch10 = data.find(d => Math.abs(parseFloat(d.T) - 1.0) < 0.05)?.Ch || '-';
      const Ch20 = data.find(d => Math.abs(parseFloat(d.T) - 2.0) < 0.1)?.Ch || '-';

      document.getElementById('Ch0').textContent = Ch0;
      document.getElementById('Ch04').textContent = Ch04;
      document.getElementById('Ch10').textContent = Ch10;
      document.getElementById('Ch20').textContent = Ch20;

      // Update table
      const tbody = document.querySelector('#spectrumTable tbody');
      tbody.innerHTML = data.map(d => `<tr><td>${d.T}</td><td>${d.Ch}</td><td>${d.Sa}</td>`).join('');

      // Draw chart
      drawChart(data);

      document.getElementById('result').classList.add('show');
    }

    function drawChart(data) {
      const canvas = document.getElementById('chart');
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(0, 0, w, h);
      
      const maxSa = Math.max(...data.map(d => parseFloat(d.Sa)));
      const maxT = Math.max(...data.map(d => parseFloat(d.T)));
      
      const pad = 40;
      ctx.strokeStyle = '#1f6feb';
      ctx.lineWidth = 2;
      ctx.beginPath();
      
      data.forEach((d, i) => {
        const x = pad + (parseFloat(d.T) / maxT) * (w - pad - 20);
        const y = h - pad - (parseFloat(d.Sa) / maxSa) * (h - pad - 20);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      
      ctx.stroke();
      
      // Axes
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad, pad);
      ctx.lineTo(pad, h - pad);
      ctx.lineTo(w - 10, h - pad);
      ctx.stroke();
      
      // Labels
      ctx.fillStyle = '#333';
      ctx.font = '12px Arial';
      ctx.fillText('T (s)', w/2, h - 10);
      ctx.save();
      ctx.translate(15, h/2);
      ctx.rotate(-Math.PI/2);
      ctx.fillText('Sa (g)', 0, 0);
      ctx.restore();
    }
  </script>
</body>
</html>

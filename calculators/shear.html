<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZS 3101 Shear Capacity Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0f172a; --muted: #5b6474; --accent: #0f766e; --card: rgba(255,255,255,0.85); --shadow: 0 20px 50px rgba(15,23,42,0.15); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(160deg, #f5e8d4 0%, #e4d3c1 50%, #c7b098 100%); font-family: 'Space Grotesk', sans-serif; color: var(--ink); padding: 2rem 1rem; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-family: 'Fraunces', serif; font-size: clamp(1.8rem,4vw,2.5rem); margin: 0 0 0.5rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .card { background: var(--card); border-radius: 16px; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
    h2 { margin: 0 0 1rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
    .field input, .field select { padding: 0.6rem 0.8rem; border-radius: 8px; border: 1px solid rgba(15,23,42,0.15); font-size: 0.95rem; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,118,110,0.1); }
    .btn { background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 999px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .result-box { background: #e8f5f3; border-radius: 12px; padding: 1.2rem; border-left: 4px solid var(--accent); margin-top: 1.5rem; display: none; }
    .result-box.show { display: block; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 1rem; margin-bottom: 1rem; }
    .result-item { background: white; padding: 0.8rem; border-radius: 8px; }
    .result-item label { font-size: 0.8rem; color: var(--muted); display: block; }
    .result-item span { font-size: 1.2rem; font-weight: 600; }
    .status { padding: 0.7rem 0.9rem; border-radius: 12px; font-weight: 600; margin-top: 1rem; }
    .status.pass { background: rgba(22,163,74,0.12); color: #16a34a; }
    .status.fail { background: rgba(180,35,24,0.12); color: #b42318; }
    .formula-box { background: #f8f8f8; padding: 0.8rem; border-radius: 8px; margin-top: 1rem; font-family: monospace; font-size: 0.85rem; }
    .note { font-size: 0.8rem; color: var(--muted); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NZS 3101 Shear Capacity</h1>
    <p class="subtitle">Calculate nominal shear capacity Vn per NZS 3101:2006 Clauses 7.5 and 9.3.9</p>

    <div class="card">
      <h2>Materials & Geometry</h2>
      <div class="form-grid">
        <div class="field">
          <label>Concrete f'c (MPa)</label>
          <input type="number" id="fc" value="30" min="10" step="0.5">
        </div>
        <div class="field">
          <label>Aggregate size (mm)</label>
          <select id="agg">
            <option value="19">19mm (standard)</option>
            <option value="10">10mm (fine)</option>
            <option value="13">13mm</option>
          </select>
        </div>
        <div class="field">
          <label>Beam width bw (mm)</label>
          <input type="number" id="bw" value="300" min="100" step="10">
        </div>
        <div class="field">
          <label>Effective depth d (mm)</label>
          <input type="number" id="d" value="500" min="150" step="10">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Reinforcement</h2>
      <div class="form-grid">
        <div class="field">
          <label>Longitudinal As (mm²)</label>
          <input type="number" id="As" value="2000" min="200" step="50">
        </div>
        <div class="field">
          <label>Stirrup diameter ds (mm)</label>
          <select id="ds">
            <option value="10">10mm</option>
            <option value="12">12mm</option>
            <option value="8">8mm</option>
          </select>
        </div>
        <div class="field">
          <label>Stirrup legs n</label>
          <input type="number" id="legs" value="2" min="2" step="1">
        </div>
        <div class="field">
          <label>Stirrup spacing s (mm)</label>
          <input type="number" id="s" value="200" min="50" step="10">
        </div>
        <div class="field">
          <label>Steel fy (MPa)</label>
          <input type="number" id="fy" value="500" min="250" step="10">
        </div>
      </div>
    </div>

    <button class="btn" onclick="calculate()">Calculate Shear Capacity</button>

    <div class="result-box" id="result">
      <h2>Results</h2>
      <div class="formula-box">
        Vn = Vc + Vs per NZS 3101 Clause 7.5.3
      </div>
      <div class="result-grid">
        <div class="result-item"><label>Vc (kN)</label><span id="vc">-</span></div>
        <div class="result-item"><label>Vs (kN)</label><span id="vs">-</span></div>
        <div class="result-item"><label>Vn (kN)</label><span id="vn">-</span></div>
        <div class="result-item"><label>vn (MPa)</label><span id="vnStress">-</span></div>
      </div>
      <div class="result-grid">
        <div class="result-item"><label>ka</label><span id="ka">-</span></div>
        <div class="result-item"><label>kd</label><span id="kd">-</span></div>
        <div class="result-item"><label>vb (MPa)</label><span id="vb">-</span></div>
        <div class="result-item"><label>vmax (MPa)</label><span id="vmax">-</span></div>
      </div>
      <div class="status" id="status">-</div>
      <p class="note">Based on NZS 3101:2006 Clauses 7.5 and 9.3.9. Verify with full design.</p>
    </div>
  </div>

  <script>
    function calculate() {
      const fc = parseFloat(document.getElementById('fc').value);
      const agg = parseInt(document.getElementById('agg').value);
      const bw = parseFloat(document.getElementById('bw').value);
      const d = parseFloat(document.getElementById('d').value);
      const As = parseFloat(document.getElementById('As').value);
      const ds = parseInt(document.getElementById('ds').value);
      const legs = parseInt(document.getElementById('legs').value);
      const s = parseFloat(document.getElementById('s').value);
      const fy = parseFloat(document.getElementById('fy').value);

      const sqrtFc = Math.sqrt(fc);
      const dv = d; // effective shear depth

      // ρw = As / (bw × d)
      const rhoW = As / (bw * dv);

      // ka: aggregate interlock factor per Clause 9.3.9.3.3
      let ka = 1.0;
      if (agg <= 10) ka = 0.85;
      else if (agg < 19) ka = 0.85 + (agg - 10) / 9 * 0.15;

      // kd: size effect factor per Clause 9.3.9.3.4(c)
      let kd = 1.0;
      if (dv > 400) kd = Math.pow(400 / dv, 0.25);
      kd = Math.max(0.9, Math.min(1.0, kd));

      // vb: base shear stress per Clause 9.3.9.3.2
      const vb1 = (0.07 + 10 * rhoW) * sqrtFc;
      const vb2 = 0.2 * sqrtFc;
      const vbMin = 0.08 * sqrtFc;
      const vb = Math.max(Math.min(vb1, vb2), vbMin);

      // vc: concrete shear stress
      const vc = ka * kd * vb;

      // Vc: concrete contribution
      const Vc = vc * bw * dv / 1000;

      // Vs: steel contribution per Clause 9.3.9.4
      const Av = legs * Math.PI * ds * ds / 4;
      const Vs = Av * fy * dv / s / 1000;

      // Vn: nominal capacity
      const Vn = Vc + Vs;

      // vn: shear stress
      const vn = Vn * 1000 / (bw * dv);

      // vmax per Clause 7.5.2
      const vmax = Math.min(0.2 * fc, 10);

      // Display
      document.getElementById('vc').textContent = Vc.toFixed(1);
      document.getElementById('vs').textContent = Vs.toFixed(1);
      document.getElementById('vn').textContent = Vn.toFixed(1);
      document.getElementById('vnStress').textContent = vn.toFixed(2);
      document.getElementById('ka').textContent = ka.toFixed(2);
      document.getElementById('kd').textContent = kd.toFixed(3);
      document.getElementById('vb').textContent = vb.toFixed(2);
      document.getElementById('vmax').textContent = vmax.toFixed(1);

      const status = document.getElementById('status');
      if (vn <= vmax) {
        status.textContent = `PASS - vn=${vn.toFixed(2)}MPa ≤ vmax=${vmax.toFixed(1)}MPa`;
        status.className = 'status pass';
      } else {
        status.textContent = `FAIL - vn=${vn.toFixed(2)}MPa > vmax=${vmax.toFixed(1)}MPa. Increase section or reinforcement.`;
        status.className = 'status fail';
      }

      document.getElementById('result').classList.add('show');
    }
  </script>
</body>
</html>
